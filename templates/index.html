
<!DOCTYPE html>
<html>

<head>
    <title>Language Translation Tool</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            box-shadow: 0px 0px 10px gray;
        }

        textarea,
        select,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            background: #eeeeee;
            padding: 15px;
            border-radius: 5px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🌍 Language Translation Tool</h1>

        <form method="POST">

            <label>Enter Text:</label>
            <textarea name="text" rows="5"></textarea>

            <label>Source Language:</label>
            <select name="source_language">
                <option value="auto">Auto Detect</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
                <option value="ta">Tamil</option>
            </select>

            <label>Target Language:</label>
            <select name="target_language">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
                <option value="ta">Tamil</option>
            </select>

            <button type="submit">Translate</button>

        </form>

        {% if translated_text %}

        <div class="result">

            <h3>Translated Text:</h3>

            <p id="translatedText">{{ translated_text }}</p>

            <button type="button" onclick="copyText()">
                Copy Text
            </button>

        </div>

        {% endif %}

        {% if audio_file %}

        <audio controls style="width:100%; margin-top:15px;">
            <source src="{{ audio_file }}" type="audio/mpeg">
        </audio>

        {% endif %}

    </div>

    <script>

        function copyText() {

            const text =
            document.getElementById("translatedText").innerText;

            navigator.clipboard.writeText(text);

            alert("Translated text copied!");

        }

    </script>

</body>

</html>
